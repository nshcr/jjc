name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-15-intel
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.1
          targets: ${{ matrix.target }}
      - name: Verify tag matches Cargo package version
        shell: bash
        run: |
          package_version="$(cargo pkgid | sed 's/.*[#@]//')"
          test "$GITHUB_REF_NAME" = "v$package_version"
      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}
      - name: Package Unix binary
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          archive="jjc-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir "$archive"
          cp "target/${{ matrix.target }}/release/jjc" "$archive/"
          cp README.md LICENSE "$archive/"
          tar -czf "$archive.tar.gz" "$archive"
      - name: Package Windows binary
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $archive = "jjc-$env:GITHUB_REF_NAME-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $archive | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/jjc.exe" "$archive/"
          Copy-Item README.md, LICENSE "$archive/"
          Compress-Archive -Path $archive -DestinationPath "$archive.zip"
      - uses: actions/upload-artifact@v7
        with:
          name: jjc-${{ matrix.target }}
          path: jjc-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: jjc-*
          path: dist
          merge-multiple: true
      - name: Generate checksums
        working-directory: dist
        run: sha256sum jjc-* > SHA256SUMS
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --generate-notes \
            --title "$GITHUB_REF_NAME"
